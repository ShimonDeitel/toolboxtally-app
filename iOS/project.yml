name: ToolboxTally
options:
  bundleIdPrefix: com.shimondeitel.toolboxtally
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ToolboxTally:
    type: application
    platform: iOS
    sources:
      - path: ToolboxTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolboxtally
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ToolboxTally/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToolboxTallyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToolboxTallyTests
      - path: ToolboxTally.storekit
    dependencies:
      - target: ToolboxTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolboxtally.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToolboxTallyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToolboxTallyUITests
    dependencies:
      - target: ToolboxTally
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolboxtally.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ToolboxTally:
    build:
      targets:
        ToolboxTally: all
        ToolboxTallyTests: [test]
        ToolboxTallyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ToolboxTally.storekit
    test:
      config: Debug
      storeKitConfiguration: ToolboxTally.storekit
      targets:
        - ToolboxTallyTests
        - ToolboxTallyUITests
    archive:
      config: Release
